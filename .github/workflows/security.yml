name: Security Scanning

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main']
  schedule:
    # Run security scan weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: |
          echo "## 🔒 Dependency Audit Results" >> $GITHUB_STEP_SUMMARY

          # Static-export project: server-side & build-only vulns do not apply.
          # Excepted packages (reviewed 2026-04-11, re-check by 2026-07-11):
          #   next      — server-side vulns irrelevant for output:'export'
          #   rollup    — build-time only, not in production bundle
          #   vite      — build-time only, not in production bundle
          #   jspdf     — v4.2.0 is latest; vuln is unpatched upstream (client-only use)
          #   dompurify — transitive dep of jspdf; same situation
          EXCEPTED="^next$|^rollup$|^vite$|^jspdf$|^dompurify$"

          AUDIT_OUTPUT=$(npm audit --json 2>/dev/null || true)
          CRITICAL_COUNT=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.critical // 0')

          if [ "$CRITICAL_COUNT" -eq 0 ]; then
            echo "✅ No critical vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
          else
            # Count non-excepted critical vulnerabilities
            NON_EXCEPTED=$(echo "$AUDIT_OUTPUT" | jq -r \
              --arg pat "$EXCEPTED" \
              '[.vulnerabilities | to_entries[] | select(.value.severity == "critical") | .key | select(test($pat) | not)] | length')

            CRITICAL_PKGS=$(echo "$AUDIT_OUTPUT" | jq -r \
              '[.vulnerabilities | to_entries[] | select(.value.severity == "critical") | .key] | join(", ")')

            if [ "${NON_EXCEPTED:-0}" -eq 0 ]; then
              echo "⚠️ $CRITICAL_COUNT critical vuln(s) in excepted packages: $CRITICAL_PKGS" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "This project uses \`output: 'export'\` (static site). See workflow comments for rationale." >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $NON_EXCEPTED non-excepted critical vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              npm audit --audit-level=critical >> $GITHUB_STEP_SUMMARY 2>&1 || true
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Full Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          npm audit 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{matrix.language}}'
