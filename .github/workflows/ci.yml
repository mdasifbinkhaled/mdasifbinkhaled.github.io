name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-ci-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.config.{ts,js,mjs}', 'src/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-ci-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-ci-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check formatting
        run: npm run format:check

      - name: Lint code
        run: npm run lint:check

      - name: Run type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5

      - name: Build application
        run: npm run build

      - name: Verify static export
        run: |
          if [ ! -f "out/index.html" ]; then
            echo "❌ Static export failed — out/index.html missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          PAGE_COUNT=$(find out -name 'index.html' | wc -l)
          echo "## Build Results 📊" >> $GITHUB_STEP_SUMMARY
          echo "✅ Static export: $PAGE_COUNT pages generated" >> $GITHUB_STEP_SUMMARY

      - name: Install Playwright browser for CI gate
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: '--offline --no-progress --root-dir out "out/**/*.html"'
          fail: true
